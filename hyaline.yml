llm:
  provider: github-models
  model: openai/gpt-5
  key: ${GITHUB_TOKEN}

github:
  token: ${GITHUB_TOKEN}

extract:
  source:
    id: slash-prompt
    description: documentation for slash-prompt
  crawler:
    type: fs
    options:
      path: ./
    include:
      - "README.md"
  extractors:
    - type: md
      include:
        - "**/*.md"

check:
  code:
    include:
      - "**/*.go"
      - "Makefile"
    exclude:
      - "e2e/**/*"
      - "**/*_test.go"
  documentation:
    include:
      - source: slash-prompt
  options:
    detectDocumentationUpdates:
      source: slash-prompt